<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telahome Halı Hesaplama</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; font-family: 'DM Sans', sans-serif; color: #f1f5f9; min-height: 100vh; }

    .header {
      background: #0f172a; border-bottom: 1px solid #1e293b;
      padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff;
    }
    .header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .header span { color: #94a3b8; font-size: 13px; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 16px;
      padding: 24px; margin-bottom: 20px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 16px; }

    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .label { display: block; color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    .input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid #334155; background: #1e293b; color: #f1f5f9;
      font-size: 14px; font-family: inherit; outline: none; transition: border 0.2s;
    }
    .input:focus { border-color: #8b5cf6; }

    select.input option { background: #1e293b; color: #f1f5f9; }

    .textarea {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid #334155; background: #1e293b; color: #f1f5f9;
      font-size: 14px; font-family: inherit; outline: none; resize: vertical; min-height: 60px;
    }
    .textarea:focus { border-color: #8b5cf6; }

    .result-box {
      margin-top: 16px; padding: 20px; border-radius: 12px;
      background: linear-gradient(135deg, #1e1040, #0f172a);
      border: 1px solid #4f46e5;
      display: flex; flex-wrap: wrap; gap: 0;
    }
    .result-item {
      flex: 1 1 120px; padding: 8px 16px; border-right: 1px solid #334155; min-width: 100px;
    }
    .result-item:last-child { border-right: none; }
    .result-label { color: #94a3b8; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }
    .result-value { font-weight: 700; font-size: 18px; }

    .btn-primary {
      padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      font-family: inherit; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-danger {
      padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; color: #fca5a5; background: #450a0a;
    }
    .btn-print {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #fff; background: #16a34a;
      font-family: inherit;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; padding: 10px 12px; border-bottom: 1px solid #1e293b; }
    td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 13px; color: #cbd5e1; }
    tr:hover { background: #1e293b33; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }
    .badge-kesim { background: #1e3a5f; color: #60a5fa; }
    .badge-serme { background: #14532d; color: #4ade80; }
    .badge-diger { background: #3f3f46; color: #a1a1aa; }

    @media print {
      body { background: #fff; color: #000; }
      .header, .card, .result-box { background: #fff; border-color: #ddd; color: #000; }
      .no-print { display: none !important; }
      .result-label, .label, th { color: #555; }
      .result-value, td { color: #000; }
      .badge-kesim, .badge-serme, .badge-diger { background: #eee; color: #333; }
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .result-item { flex: 1 1 100%; border-right: none; border-bottom: 1px solid #334155; padding: 6px 12px; }
      .result-item:last-child { border-bottom: none; }
      td, th { padding: 8px 6px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">TH</div>
      <div>
        <h1>Halı Hesaplama</h1>
        <span>Telahome</span>
      </div>
    </div>
  </div>

  <div class="container" id="app">

    <!-- HESAPLAMA FORMU -->
    <div class="card no-print">
      <h3 class="card-title">📐 Yeni Hesaplama</h3>

      <div class="form-grid">
        <div>
          <label class="label">Müşteri Adı</label>
          <input class="input" id="musteriAdi" placeholder="Müşteri adı" />
        </div>
        <div>
          <label class="label">Telefon</label>
          <input class="input" id="telefon" placeholder="05xx xxx xx xx" />
        </div>
        <div>
          <label class="label">Tarih</label>
          <input class="input" type="date" id="tarih" />
        </div>
        <div>
          <label class="label">İşlem Türü</label>
          <select class="input" id="islemTuru">
            <option value="kesim">Kesim</option>
            <option value="serme">Serme</option>
            <option value="diger">Diğer</option>
          </select>
        </div>
      </div>

      <div class="form-grid" style="margin-top: 14px;">
        <div>
          <label class="label">En (metre)</label>
          <input class="input" type="number" step="0.01" id="en" placeholder="örn: 3.50" oninput="hesapla()" />
        </div>
        <div>
          <label class="label">Boy (metre)</label>
          <input class="input" type="number" step="0.01" id="boy" placeholder="örn: 4.20" oninput="hesapla()" />
        </div>
        <div>
          <label class="label">m² Fiyatı (₺)</label>
          <input class="input" type="number" step="0.01" id="m2fiyat" placeholder="örn: 250" oninput="hesapla()" />
        </div>
        <div>
          <label class="label">Adet</label>
          <input class="input" type="number" id="adet" value="1" min="1" oninput="hesapla()" />
        </div>
      </div>

      <div>
        <label class="label" style="margin-top: 14px;">Not</label>
        <textarea class="textarea" id="not" placeholder="Ek bilgi (renk, desen, adres vb.)"></textarea>
      </div>

      <!-- CANLI HESAPLAMA -->
      <div class="result-box" id="resultBox" style="display: none;">
        <div class="result-item">
          <div class="result-label">Metrekare</div>
          <div class="result-value" id="resM2" style="color: #8b5cf6;">-</div>
        </div>
        <div class="result-item">
          <div class="result-label">Toplam m²</div>
          <div class="result-value" id="resTotalM2" style="color: #60a5fa;">-</div>
        </div>
        <div class="result-item">
          <div class="result-label">Birim Tutar</div>
          <div class="result-value" id="resBirim" style="color: #f59e0b;">-</div>
        </div>
        <div class="result-item">
          <div class="result-label">Toplam Tutar</div>
          <div class="result-value" id="resTotal" style="color: #22c55e;">-</div>
        </div>
      </div>

      <div style="margin-top: 16px; display: flex; gap: 10px;">
        <button class="btn-primary" onclick="kaydet()">✅ Kaydet</button>
        <button class="btn-primary" style="background: linear-gradient(135deg, #334155, #1e293b);" onclick="temizle()">🗑️ Temizle</button>
      </div>
    </div>

    <!-- GEÇMİŞ HESAPLAMALAR -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
        <h3 class="card-title" style="margin-bottom: 0;">📋 Hesaplama Geçmişi</h3>
        <div class="no-print" style="display: flex; gap: 8px; align-items: center;">
          <input class="input" id="aramaInput" placeholder="🔍 Müşteri ara..." style="max-width: 200px;" oninput="listele()" />
          <button class="btn-print no-print" onclick="window.print()">🖨️ Yazdır</button>
        </div>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Müşteri</th>
              <th>Telefon</th>
              <th>En × Boy</th>
              <th>m²</th>
              <th>Adet</th>
              <th>m² Fiyat</th>
              <th>Toplam</th>
              <th>Tür</th>
              <th>Not</th>
              <th class="no-print"></th>
            </tr>
          </thead>
          <tbody id="gecmisBody">
            <tr><td colspan="11" style="text-align: center; color: #64748b;">Henüz kayıt yok</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Bugünün tarihini otomatik yaz
    document.getElementById("tarih").value = new Date().toISOString().slice(0, 10);

    // LocalStorage ile veri yönetimi
    function getKayitlar() {
      try { return JSON.parse(localStorage.getItem("hali_kayitlar") || "[]"); }
      catch(e) { return []; }
    }
    function setKayitlar(data) {
      localStorage.setItem("hali_kayitlar", JSON.stringify(data));
    }

    function formatTL(n) {
      return "₺" + Number(n || 0).toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Canlı hesaplama
    function hesapla() {
      var en = parseFloat(document.getElementById("en").value) || 0;
      var boy = parseFloat(document.getElementById("boy").value) || 0;
      var fiyat = parseFloat(document.getElementById("m2fiyat").value) || 0;
      var adet = parseInt(document.getElementById("adet").value) || 1;

      var m2 = en * boy;
      var toplamM2 = m2 * adet;
      var birimTutar = m2 * fiyat;
      var toplam = birimTutar * adet;

      var box = document.getElementById("resultBox");
      if (en > 0 && boy > 0) {
        box.style.display = "flex";
        document.getElementById("resM2").textContent = m2.toFixed(2) + " m²";
        document.getElementById("resTotalM2").textContent = toplamM2.toFixed(2) + " m²";
        document.getElementById("resBirim").textContent = formatTL(birimTutar);
        document.getElementById("resTotal").textContent = formatTL(toplam);
      } else {
        box.style.display = "none";
      }
    }

    // Kaydet
    function kaydet() {
      var en = parseFloat(document.getElementById("en").value);
      var boy = parseFloat(document.getElementById("boy").value);
      var fiyat = parseFloat(document.getElementById("m2fiyat").value);
      var adet = parseInt(document.getElementById("adet").value) || 1;

      if (!en || !boy) return alert("En ve boy giriniz!");
      if (!fiyat) return alert("m² fiyatı giriniz!");

      var m2 = en * boy;
      var toplam = m2 * fiyat * adet;

      var kayit = {
        id: Date.now(),
        tarih: document.getElementById("tarih").value,
        musteri: document.getElementById("musteriAdi").value || "-",
        telefon: document.getElementById("telefon").value || "-",
        en: en,
        boy: boy,
        m2: m2,
        adet: adet,
        m2fiyat: fiyat,
        toplam: toplam,
        tur: document.getElementById("islemTuru").value,
        not: document.getElementById("not").value || ""
      };

      var kayitlar = getKayitlar();
      kayitlar.unshift(kayit);
      setKayitlar(kayitlar);
      listele();
      temizle();
      alert("Kayıt eklendi!");
    }

    // Temizle
    function temizle() {
      document.getElementById("musteriAdi").value = "";
      document.getElementById("telefon").value = "";
      document.getElementById("tarih").value = new Date().toISOString().slice(0, 10);
      document.getElementById("islemTuru").value = "kesim";
      document.getElementById("en").value = "";
      document.getElementById("boy").value = "";
      document.getElementById("m2fiyat").value = "";
      document.getElementById("adet").value = "1";
      document.getElementById("not").value = "";
      document.getElementById("resultBox").style.display = "none";
    }

    // Sil
    function sil(id) {
      if (!confirm("Bu kaydı silmek istediğinize emin misiniz?")) return;
      var kayitlar = getKayitlar().filter(function(k) { return k.id !== id; });
      setKayitlar(kayitlar);
      listele();
    }

    // Listele
    function listele() {
      var kayitlar = getKayitlar();
      var arama = (document.getElementById("aramaInput").value || "").toLocaleLowerCase("tr");
      if (arama) {
        kayitlar = kayitlar.filter(function(k) {
          return k.musteri.toLocaleLowerCase("tr").indexOf(arama) !== -1 ||
                 k.telefon.indexOf(arama) !== -1;
        });
      }

      var tbody = document.getElementById("gecmisBody");

      if (kayitlar.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align: center; color: #64748b;">Kayıt bulunamadı</td></tr>';
        return;
      }

      var html = "";
      var badgeClass = { kesim: "badge-kesim", serme: "badge-serme", diger: "badge-diger" };
      var turLabel = { kesim: "Kesim", serme: "Serme", diger: "Diğer" };

      kayitlar.forEach(function(k) {
        html += '<tr>'
          + '<td>' + k.tarih + '</td>'
          + '<td style="font-weight: 600; color: #f1f5f9;">' + k.musteri + '</td>'
          + '<td>' + k.telefon + '</td>'
          + '<td>' + k.en + ' × ' + k.boy + '</td>'
          + '<td style="color: #8b5cf6; font-weight: 600;">' + k.m2.toFixed(2) + '</td>'
          + '<td>' + (k.adet || 1) + '</td>'
          + '<td>' + formatTL(k.m2fiyat) + '</td>'
          + '<td style="color: #22c55e; font-weight: 700;">' + formatTL(k.toplam) + '</td>'
          + '<td><span class="badge ' + (badgeClass[k.tur] || "badge-diger") + '">' + (turLabel[k.tur] || k.tur) + '</span></td>'
          + '<td style="max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="' + (k.not || "") + '">' + (k.not || "-") + '</td>'
          + '<td class="no-print"><button class="btn-danger" onclick="sil(' + k.id + ')">Sil</button></td>'
          + '</tr>';
      });

      tbody.innerHTML = html;
    }

    // Sayfa yüklendiğinde listele
    listele();
  </script>

</body>
</html>
